                                                            <div className="flex justify-between items-start mobile-flex-col mobile-gap-2">
                                                                <div className="mobile-w-full">
                                                                    <h3 className="text-lg font-bold text-gray-800 mobile-text-base">
                                                                        {item.sku} from {item.geography}
                                                                    </h3>
                                                                    <div className="flex gap-2 mt-2 flex-wrap">
                                                                        <span className={`${getQualityColor(item.quality)} text-white px-3 py-1 rounded-full text-xs font-medium`}>
                                                                            {item.quality} Quality
                                                                        </span>
                                                                        <span className="bg-gray-700 text-white px-3 py-1 rounded-full text-xs">
                                                                            {item.category}
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                                <div className="text-right mobile-text-left mobile-w-full mobile-mt-2">
                                                                    <div className="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm mb-2 mobile-text-xs inline-block">
                                                                        PEAK: {item.peakPeriod}
                                                                    </div>
                                                                    <div className="text-xs text-gray-600">
                                                                        Available: {item.availablePeriod}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white rounded-xl shadow-lg p-6 mobile-p-4">
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2 mobile-text-lg mobile-mb-3">
                                                <TrendingUp size={28} className="text-amber-600 md:w-7 md:h-7 w-5 h-5" />
                                                💡 New Sourcing Opportunities
                                            </h2>
                                            <p className="text-gray-600 mb-4 mobile-text-sm mobile-mb-3">
                                                Consider adding these sources to diversify supply and ensure availability.
                                            </p>

                                            {/* Desktop Table */}
                                            <div className="overflow-x-auto mobile-table-container hidden md:block">
                                                <table className="w-full mobile-table">
                                                    <thead>
                                                        <tr className="border-b-2 border-gray-200">
                                                            <th className="text-left p-3 font-semibold text-gray-700">SKU</th>
                                                            <th className="text-left p-3 font-semibold text-gray-700">Geography</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Category</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Quality</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Peak Period</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Priority</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {newOpportunities.map((item, idx) => (
                                                            <tr key={idx} className={`border-b border-gray-100 ${item.isPeak ? 'bg-amber-50' : ''}`}>
                                                                <td className="p-3 font-medium text-gray-800">{item.sku}</td>
                                                                <td className="p-3 text-gray-600">{item.geography}</td>
                                                                <td className="p-3 text-center text-gray-600">{item.category}</td>
                                                                <td className="p-3 text-center">
                                                                    <span className={`${getQualityColor(item.quality)} text-white px-3 py-1 rounded-full text-xs font-medium`}>
                                                                        {item.quality}
                                                                    </span>
                                                                </td>
                                                                <td className="p-3 text-center text-sm text-gray-600">{item.peakPeriod}</td>
                                                                <td className="p-3 text-center">
                                                                    {item.isPeak ? (
                                                                        <span className="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">
                                                                            HIGH
                                                                        </span>
                                                                    ) : (
                                                                        <span className="bg-yellow-500 text-white px-3 py-1 rounded-full text-xs">
                                                                            MEDIUM
                                                                        </span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>

                                            {/* Mobile Cards */}
                                            <div className="md:hidden space-y-3">
                                                {newOpportunities.map((item, idx) => (
                                                    <div key={idx} className={`border-2 rounded-lg p-3 ${item.isPeak ? 'border-amber-500 bg-amber-50' : 'border-gray-200 bg-white'}`}>
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div>
                                                                <div className="font-bold text-gray-800 text-sm">{item.sku}</div>
                                                                <div className="text-xs text-gray-600">🌍 {item.geography}</div>
                                                                <div className="text-xs text-gray-500">{item.category}</div>
                                                            </div>
                                                            {item.isPeak ? (
                                                                <span className="bg-red-500 text-white px-2 py-1 rounded-full text-xs font-bold">
                                                                    HIGH
                                                                </span>
                                                            ) : (
                                                                <span className="bg-yellow-500 text-white px-2 py-1 rounded-full text-xs">
                                                                    MEDIUM
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className="flex justify-between items-center">
                                                            <span className={`${getQualityColor(item.quality)} text-white px-2 py-1 rounded-full text-xs font-medium`}>
                                                                {item.quality}
                                                            </span>
                                                            <span className="text-xs text-gray-600">Peak: {item.peakPeriod}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CompleteSKUManager />, document.getElementById('root'));
    </script>
</body>
</html>
