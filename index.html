                                {procurementView === 'category' && (
                                    <div className="space-y-6">
                                        {Object.entries(byCategory).map(([category, items]) => (
                                            items.length > 0 && (
                                                <div key={category} className="bg-white rounded-xl shadow-lg p-6">
                                                    <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                        {category === 'Fruits' ? '🍎' : '🥕'} {category}
                                                        <span className="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-medium ml-2">
                                                            {items.length} items
                                                        </span>
                                                    </h2>

                                                    <div className="overflow-x-auto">
                                                        <table className="w-full">
                                                            <thead>
                                                                <tr className="border-b-2 border-gray-200">
                                                                    <th className="text-left p-3 font-semibold text-gray-700">SKU</th>
                                                                    <th className="text-left p-3 font-semibold text-gray-700">Geography</th>
                                                                    <th className="text-center p-3 font-semibold text-gray-700">Quality</th>
                                                                    <th className="text-center p-3 font-semibold text-gray-700">Season Status</th>
                                                                    <th className="text-center p-3 font-semibold text-gray-700">Action</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {items.map((item, idx) => (
                                                                    <tr key={idx} className={`border-b border-gray-100 ${item.isPeak ? 'bg-green-50' : ''}`}>
                                                                        <td className="p-3 font-medium text-gray-800">{item.sku}</td>
                                                                        <td className="p-3 text-gray-600">{item.geography}</td>
                                                                        <td className="p-3 text-center">
                                                                            <span className={`${getQualityColor(item.quality)} text-white px-3 py-1 rounded-full text-xs font-medium`}>
                                                                                {item.quality}
                                                                            </span>
                                                                        </td>
                                                                        <td className="p-3 text-center">
                                                                            {item.isPeak ? (
                                                                                <span className="bg-green-600 text-white px-3 py-1 rounded-full text-xs font-bold">
                                                                                    🌟 PEAK SEASON
                                                                                </span>
                                                                            ) : (
                                                                                <span className="bg-blue-200 text-blue-800 px-3 py-1 rounded-full text-xs">
                                                                                    Available
                                                                                </span>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-3 text-center">
                                                                            {item.isCurrentlySourced ? (
                                                                                <span className="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs">
                                                                                    Already Sourcing
                                                                                </span>
                                                                            ) : (
                                                                                <span className="bg-amber-500 text-white px-3 py-1 rounded-full text-xs font-bold">
                                                                                    ⚡ START SOURCING
                                                                                </span>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                )}

                                {procurementView === 'critical' && (
                                    <div className="space-y-6">
                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                <AlertCircle size={28} className="text-red-600" />
                                                🚨 URGENT: Peak Season Starting - Action Required
                                            </h2>
                                            <p className="text-gray-600 mb-4">
                                                These SKUs are entering peak season in {nextMonthFull} and are NOT currently sourced. 
                                                Start procurement NOW for best quality and pricing.
                                            </p>

                                            {criticalProcurement.length === 0 ? (
                                                <div className="bg-green-50 border-l-4 border-green-500 p-4 rounded">
                                                    <p className="text-green-800 font-medium">
                                                        ✅ No critical gaps! All peak season SKUs are already sourced.
                                                    </p>
                                                </div>
                                            ) : (
                                                <div className="space-y-3">
                                                    {criticalProcurement.map((item, idx) => (
                                                        <div key={idx} className="border-l-4 border-red-500 bg-red-50 rounded-lg p-4">
                                                            <div className="flex justify-between items-start">
                                                                <div>
                                                                    <h3 className="text-lg font-bold text-gray-800">
                                                                        {item.sku} from {item.geography}
                                                                    </h3>
                                                                    <div className="flex gap-2 mt-2">
                                                                        <span className={`${getQualityColor(item.quality)} text-white px-3 py-1 rounded-full text-xs font-medium`}>
                                                                            {item.quality} Quality
                                                                        </span>
                                                                        <span className="bg-gray-700 text-white px-3 py-1 rounded-full text-xs">
                                                                            {item.category}
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                                <div className="text-right">
                                                                    <div className="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm mb-2">
                                                                        PEAK: {item.peakPeriod}
                                                                    </div>
                                                                    <div className="text-xs text-gray-600">
                                                                        Available: {item.availablePeriod}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                <TrendingUp size={28} className="text-amber-600" />
                                                💡 New Sourcing Opportunities for {nextMonthFull}
                                            </h2>
                                            <p className="text-gray-600 mb-4">
                                                Consider adding these sources to diversify supply and ensure availability.
                                            </p>

                                            <div className="overflow-x-auto">
                                                <table className="w-full">
                                                    <thead>
                                                        <tr className="border-b-2 border-gray-200">
                                                            <th className="text-left p-3 font-semibold text-gray-700">SKU</th>
                                                            <th className="text-left p-3 font-semibold text-gray-700">Geography</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Category</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Quality</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Peak Period</th>
                                                            <th className="text-center p-3 font-semibold text-gray-700">Priority</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {newOpportunities.map((item, idx) => (
                                                            <tr key={idx} className={`border-b border-gray-100 ${item.isPeak ? 'bg-amber-50' : ''}`}>
                                                                <td className="p-3 font-medium text-gray-800">{item.sku}</td>
                                                                <td className="p-3 text-gray-600">{item.geography}</td>
                                                                <td className="p-3 text-center text-gray-600">{item.category}</td>
                                                                <td className="p-3 text-center">
                                                                    <span className={`${getQualityColor(item.quality)} text-white px-3 py-1 rounded-full text-xs font-medium`}>
                                                                        {item.quality}
                                                                    </span>
                                                                </td>
                                                                <td className="p-3 text-center text-sm text-gray-600">{item.peakPeriod}</td>
                                                                <td className="p-3 text-center">
                                                                    {item.isPeak ? (
                                                                        <span className="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">
                                                                            HIGH
                                                                        </span>
                                                                    ) : (
                                                                        <span className="bg-yellow-500 text-white px-3 py-1 rounded-full text-xs">
                                                                            MEDIUM
                                                                        </span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CompleteSKUManager />, document.getElementById('root'));
    </script>
</body>
</html>
